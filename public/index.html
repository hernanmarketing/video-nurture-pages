<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Hernan Vazquez — Video Nurture Pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .logo em { color: #E41E1E; font-style: normal; }

    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 0.9rem;
      margin-bottom: 3rem;
    }

    .page-list {
      display: grid;
      gap: 1.5rem;
    }

    .page-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .page-card:hover {
      border-color: rgba(228,30,30,0.3);
      background: rgba(255,255,255,0.05);
    }

    .page-card .info h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .page-card .info p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
    }
    .page-card .badge {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      background: rgba(228,30,30,0.15);
      color: #E41E1E;
      font-weight: 600;
      white-space: nowrap;
    }
    .page-card .arrow {
      color: rgba(255,255,255,0.3);
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    footer {
      text-align: center;
      padding: 2rem 1.5rem 3rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      max-width: 900px;
      margin: 0 auto;
    }
    footer p {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
    }

    @media (max-width: 600px) {
      .container { padding: 3rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Hernan <em>Vazquez</em></div>
    <p class="subtitle">Video Nurture Pages</p>

    <div class="page-list">
      <a href="/low-ticket-book" class="page-card">
        <div class="info">
          <h2>Low Ticket Profits Book</h2>
          <p>How I Made $223,000 With Low Ticket Offers</p>
        </div>
        <span class="badge">video</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>

  <footer>
    <p>&copy; 2024 Hernan Vazquez &middot; Scale Driven &middot; All Rights Reserved</p>
  </footer>

  <script defer src="/t.js"></script>
</body>
</html>
